slam_toolbox:
  ros__parameters:

    # ==========================================
    # Plugin Parameters - Low-level optimizer configuration
    # ==========================================
    solver_plugin: solver_plugins::CeresSolver        # Backend optimizer, defaults to Ceres Solver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY       # Linear solver type, suitable for sparse matrix problems in SLAM
    ceres_preconditioner: SCHUR_JACOBI                # Preconditioner method, used to accelerate optimization iteration convergence
    ceres_trust_strategy: LEVENBERG_MARQUARDT         # Trust region strategy, classic LM non-linear least squares algorithm
    ceres_dogleg_type: TRADITIONAL_DOGLEG             # Dogleg strategy type (as a backup/auxiliary to LM)
    ceres_loss_function: None                         # Loss function, None means standard least squares (no robust kernel function)

    # ==========================================
    # ROS Parameters - Topic and system-level configuration
    # ==========================================
    odom_frame: odom                                  # Odometry frame name (must match your TF tree)
    map_frame: map                                    # Map global frame name
    base_frame: base_footprint                        # Robot base frame name (some robots use base_link)
    scan_topic: /scan                                 # Subscribed 2D Lidar topic
    use_map_saver: true                               # Whether to allow saving the map via ROS 2 service requests
    mode: mapping                                     # Operation mode: mapping or localization

    debug_logging: false                              # Whether to enable debug logging for low-level algorithms (recommended to keep off normally)
    throttle_scans: 1                                 # Scan throttling: 1 means process every frame, 2 means process 1 out of 2 frames to save CPU
    transform_publish_period: 0.02                    # Period for publishing map -> odom TF (0.02 seconds = 50Hz)
    map_update_interval: 0.2                          # Interval for publishing visual 2D grid map to topic (seconds)
    resolution: 0.05                                  # Map resolution: 0.05 means each pixel is 5cm x 5cm
    restamp_tf: false                                 # Whether to overwrite lidar timestamps with current system time
    min_laser_range: 0.0                              # Discard lidar points closer than this distance when building the map (meters)
    max_laser_range: 20.0                             # Discard lidar points further than this distance when building the map (meters)
    minimum_time_interval: 0.1                        # Minimum time interval for inserting new nodes into the pose graph (seconds)
    transform_timeout: 0.2                            # Timeout for waiting on TF tree transforms (seconds)
    tf_buffer_duration: 30.0                          # Duration to keep TF buffer (seconds)
    stack_size_to_use: 40000000                       # Thread stack size allocated when serializing map (approx. 40MB, prevents overflow)
    enable_interactive_mode: true                     # Whether to enable interactive mode in RViz (allows manual dragging to correct nodes)

    # ==========================================
    # General Parameters - Node insertion and loop closure triggering
    # ==========================================
    use_scan_matching: true                           # Must be enabled: use lidar scan matching to correct wheel odometry
    use_scan_barycenter: true                         # Use the geometric barycenter of scan points as the central reference for matching
    minimum_travel_distance: 0.02                     # Robot must translate more than this distance to record a new map node
    minimum_travel_heading: 0.02                      # Robot must rotate more than this amount to record a new map node
    check_min_dist_and_heading_precisely: false       # Whether to strictly and precisely check the above distance/heading thresholds
    scan_buffer_size: 30                              # Number of local historical lidar frames kept in memory for scan matching
    scan_buffer_maximum_scan_distance: 10.0           # Local matching only considers historical nodes within 10 meters of the current position
    link_match_minimum_response_fine: 0.1             # Minimum score for adjacent node matching; if lower, the original odometry is fully trusted
    link_scan_maximum_distance: 1.5                   # Maximum physical distance allowing adjacent nodes to establish a matching link (meters)
    loop_search_maximum_distance: 3.0                 # Search radius for triggering loop closure detection (meters)
    do_loop_closing: true                             # Whether to enable loop closure detection (core for eliminating accumulated error, must be true)
    loop_match_minimum_chain_size: 10                 # Number of consecutive matched nodes required before confirming loop closure (effectively prevents false loop closures)
    loop_match_maximum_variance_coarse: 3.0           # Maximum variance allowed for coarse matching
    loop_match_minimum_response_coarse: 0.35          # Minimum score threshold for coarse loop closure matching (enters fine matching if higher)
    loop_match_minimum_response_fine: 0.45            # Minimum score threshold for fine loop closure matching (confirms loop closure if higher)

    # ==========================================
    # Correlation Parameters - Matching search range
    # ==========================================
    # Local matching (for adjacent nodes)
    correlation_search_space_dimension: 1.5           # Window size for local translation search (meters)
    correlation_search_space_resolution: 0.01         # Step size for local translation search (1cm)
    correlation_search_space_smear_deviation: 0.1     # Local smear/smoothing deviation coefficient (for handling noise)

    # Global loop closure search (spanning longer distances)
    loop_search_space_dimension: 8.0                  # Window size for loop closure translation search (8 meters, handles large drifts)
    loop_search_space_resolution: 0.05                # Step size for loop closure translation search (5cm, slightly larger to save compute)
    loop_search_space_smear_deviation: 0.03           # Loop closure smear/smoothing deviation coefficient

    # ==========================================
    # Scan Matcher Parameters - Weight distribution
    # ==========================================
    distance_variance_penalty: 0.1                    # Penalty for distance deviating from odometry (larger value means stricter trust in wheel odometry)
    angle_variance_penalty: 0.2                       # Penalty for angle deviating from odometry (larger value means stricter trust in wheel odometry)
    fine_search_angle_offset: 0.00349                 # Fine angle search range (radians)
    coarse_search_angle_offset: 0.349                 # Coarse angle search range (radians, approx. 20 degrees)
    coarse_angle_resolution: 0.0349                   # Coarse angle search step size (radians, approx. 2 degrees)
    minimum_angle_penalty: 0.6                        # Base angle penalty coefficient
    minimum_distance_penalty: 0.3                     # Base distance penalty coefficient
    use_response_expansion: true                      # Whether to allow dynamic expansion of search range when matching score is low
    min_pass_through: 2                               # Lidar ray must pass through a blank grid 2 times to confirm it as free
    occupancy_threshold: 0.4                          # Occupancy probability threshold (if algorithm calculates > 0.1, draws black obstacle on map)